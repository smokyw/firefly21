name: vpn_tor_client
description: VPN+TOR client for Android with xray-core and Arti integration.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  mobile_scanner: ^6.0.2
  http: ^1.3.0
  path_provider: ^2.1.5
  share_plus: ^10.1.4
  permission_handler: ^11.3.1
  installed_apps: ^1.5.0
  lottie: ^3.3.1
  intl: ^0.19.0
  json_annotation: ^4.9.0
  shared_preferences: ^2.5.3
  collection: ^1.19.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.15
  riverpod_generator: ^2.6.3
  json_serializable: ^6.9.4

flutter:
  uses-material-design: true
  assets:
    - assets/animations/
