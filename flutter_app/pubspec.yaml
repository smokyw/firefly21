name: vpn_tor_client
description: VPN+TOR client for Android with xray-core and Arti integration.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  mobile_scanner: ^5.2.3
  http: ^1.3.0
  path_provider: ^2.1.5
  share_plus: ^9.0.0
  permission_handler: ^11.3.0
  lottie: ^3.1.3
  intl: ^0.19.0
  json_annotation: ^4.8.1
  shared_preferences: ^2.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.4.3
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  assets:
    - assets/animations/
